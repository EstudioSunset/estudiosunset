<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Diseño creativo y marketing digital con frescura tropical. Estudio Sunset te lleva al siguiente nivel." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Estudio Sunset – Marketing que se siente como vacaciones" />
  <meta property="og:description" content="Tu marca al nivel del atardecer más visto. Webs, redes, campañas y más." />
  <meta property="og:image" content="https://estudiosunset.com/assets/preview.jpg" />
  <meta property="og:url" content="https://estudiosunset.com" />
  <title>Generador de Logos Express | Estudio Sunset</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(to top, #87ceeb, #fff8e1);
      color: #007c91;
    }
    .navbar {
      background: #007c91;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .navbar .logo img {
      height: 40px;
    }
    .menu-toggle {
      display: none;
      font-size: 1.5rem;
      background: none;
      color: white;
      border: none;
      cursor: pointer;
    }
    .navbar-links {
      display: flex;
      gap: 2rem;
    }
    .navbar-links a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
    .navbar-links a:hover {
      text-decoration: underline;
    }
    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
      }
      .navbar-links {
        display: none;
        flex-direction: column;
        width: 100%;
        margin-top: 1rem;
      }
      .navbar-links.active {
        display: flex;
      }
    }
    main {
      padding: 2rem;
      max-width: 900px;
      margin: auto;
    }
    .logo-generator {
      background: #fff;
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .logo-generator h2 {
      text-align: center;
      color: #007c91;
    }
    .logo-generator p {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-generator input,
    .logo-generator select {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-family: inherit;
    }
    .logo-generator .button {
      display: inline-block;
      background: #007c91;
      color: #fff;
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
    }
    #logoResult {
      text-align: center;
      margin-top: 2rem;
    }
    footer {
      text-align: center;
      font-size: 0.9rem;
      color: #555;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/index.html" class="logo">
      <img src="/assets/estudio-sunset-transparent.png" alt="Estudio Sunset Logo" />
    </a>
    <button class="menu-toggle" onclick="document.querySelector('.navbar-links').classList.toggle('active')">
      &#9776;
    </button>
    <div class="navbar-links">
      <a href="/index.html">Inicio</a>
      <a href="/bundles-pricing.html">Paquetes</a>
      <a href="/servicios.html">Servicios</a>
      <a href="/index.html#contacto">Contacto</a>
      <a href="/blog.html">Blog</a>
      <a href="/terms.html">Términos</a>
    </div>
  </nav>

  <main>
    <section class="logo-generator">
      <h2>Generador de Logos Express</h2>
      <p>Tu primer logo es gratuito. El segundo cuesta $20 USD e incluye el archivo editable.</p>
      <input type="text" id="brandName" placeholder="Nombre de la marca" required />
      <select id="industry">
        <option value="">Selecciona tu industria</option>
        <option value="comida">Comida y Bebidas</option>
        <option value="tecnologia">Tecnología</option>
        <option value="moda">Moda</option>
        <option value="salud">Salud y Bienestar</option>
        <option value="otro">Otro</option>
      </select>
      <label for="primaryColor">Color principal</label>
      <input type="color" id="primaryColor" value="#f15e10" />
      <button onclick="generateLogo()" class="button">Generar Logo</button>
      <div id="logoResult"></div>
    </section>
  </main>

  <footer>
    © 2025 Estudio Sunset · Creatividad con sabor a mar<br>
    <a href="/gracias.html" style="color:#007c91; text-decoration: underline;">Ir a página de agradecimiento</a>
  </footer>

  <script>
    let logosGenerated = 0;

    function generateLogo() {
      const brand = document.getElementById("brandName").value;
      const industry = document.getElementById("industry").value;
      const color = document.getElementById("primaryColor").value;

      if (!brand || !industry) {
        alert("Por favor completa todos los campos.");
        return;
      }

      if (logosGenerated >= 1) {
        alert("Tu logo gratuito ya fue generado. El siguiente cuesta $20 USD. Escríbenos para solicitarlo.");
        return;
      }

      const svgLogo = `
        <svg width="300" height="100" xmlns="http://www.w3.org/2000/svg">
          <rect width="300" height="100" fill="white" />
          <circle cx="50" cy="50" r="30" fill="${color}" />
          <text x="100" y="60" font-size="24" fill="${color}" font-family="Montserrat">${brand}</text>
        </svg>
      `;

      document.getElementById("logoResult").innerHTML = svgLogo;
      logosGenerated++;
    }
  </script>
</body>
</html>
