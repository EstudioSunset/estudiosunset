<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Diseño creativo y marketing digital con frescura tropical. Estudio Sunset te lleva al siguiente nivel." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Estudio Sunset – Marketing que se siente como vacaciones" />
  <meta property="og:description" content="Tu marca al nivel del atardecer más visto. Webs, redes, campañas y más." />
  <meta property="og:image" content="https://estudiosunset.com/assets/preview.jpg" />
  <meta property="og:url" content="https://estudiosunset.com" />
  <title>Generador de Logos Express | Estudio Sunset</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" />
  <!-- Estilos globales y componentes -->
  <link rel="stylesheet" href="/css/base.css" />
</head>
<body>
  <!-- ========== NAVBAR ========== -->
  <nav class="navbar">
    <a href="/index.html" class="logo">
      <img src="/assets/estudio-sunset-transparent.png" alt="Estudio Sunset logo">
    </a>

    <button class="menu-toggle" aria-label="Abrir / cerrar menú">
      &#9776;
    </button>

    <div class="navbar-links">
      <a href="/index.html">Home</a>
      <a href="/logo-generator.html">Logo Generator</a>
      <a href="/bundles-pricing.html">Bundles</a>
      <a href="/servicios.html">Services</a>
      <a href="/portfolio.html">Portfolio</a>
      <a href="#contacto">Contact</a>
      <a href="/blog.html">Blog</a>
    </div>
  </nav>

  <!-- ========== HERO ========== -->
  <header class="hero">
    <img src="/assets/estudio-sunset-transparent.png"
         alt="Estudio Sunset logo"
         class="hero-logo">
  
         <p id="tagline" class="tagline">Rising your brand everyday</p>
  
    <a href="#contacto" class="cta-btn">Contact Us</a>
  </header>

  <main>
    <section class="logo-generator">
      <h2>Generador de Logos Express</h2>
      <p align="center">Tu primer logo es gratuito. El segundo cuesta $50 USD e incluye el archivo editable.</p>
      <div align="center" class="logo-generator-form">
      <input type="text" id="brandName" placeholder="Nombre de la marca" required />
      <select id="industry">
        <option value="">Selecciona tu industria</option>
        <option value="comida">Comida y Bebidas</option>
        <option value="tecnologia">Tecnología</option>
        <option value="moda">Moda</option>
        <option value="salud">Salud y Bienestar</option>
        <option value="otro">Otro</option>
      </select>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 10px; margin-bottom: 10px;"></div>
        <label for="primaryColor">Color principal</label>
        <input type="color" id="primaryColor" value="#f15e10" />
      </div>
      <div align="center">
        <button onclick="generateLogo()" class="button">Generar Logo</button>
      </div>
      <div id="recraftEmbed" style="width:100%; height:700px; margin-top:2rem;">
        <iframe id="recraftFrame"
          src=""
          style="width:100%; height:100%; border: none; border-radius: 10px;"
          loading="lazy"
          title="Recraft Logo Generator">
        </iframe>
      </div>
    </div>
    </section>
  </main>
  <div id="emailCapture" style="margin-top:1rem;" align="center">
    <input type="email" id="userEmail" placeholder="Tu correo" required />
    <button onclick="sendEmail()">Enviar y Descargar</button>
  </div>
  <button id="recraftBtn" style="display:none;" class="button" target="_blank">
    Ver ideas con IA en Recraft
  </button>
  <footer>
    © 2025 Estudio Sunset · Creatividad con sabor a mar<br>
    <a href="/gracias.html" style="color:#007c91; text-decoration: underline;">Ir a página de agradecimiento</a>
  </footer>

  <script>
    function generateLogo() {
      const brand = document.getElementById("brandName").value;
      const industry = document.getElementById("industry").value;
  
      if (!brand || !industry) {
        alert("Por favor completa todos los campos.");
        return;
      }
  
      const query = encodeURIComponent(`${brand} logo ${industry}`);
      const recraftURL = `https://www.recraft.ai/?search=${query}`;
      window.open(recraftURL, "_blank");
  
      // Si quieres mostrar el botón de recraft como alternativa a redirigir directamente:
      // const recraftBtn = document.getElementById("recraftBtn");
      // recraftBtn.href = recraftURL;
      // recraftBtn.style.display = "inline-block";
    }
  
    // Opcional: para capturar correo si decides hacerlo
    function sendEmail() {
      const email = document.getElementById("userEmail").value;
      if (!email) {
        alert("Por favor ingresa tu correo.");
        return;
      }
  
      fetch("https://formspree.io/f/mldjqkrw", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      }).then(() => {
        alert("Gracias. Te enviaremos más ideas y promociones pronto.");
      });
    }
  </script>
  

</body>
</html>
